<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="style.css">
<style>
body {
    margin: 0;
    font-family: Arial;
    background-color: #f4f4f4;
}

header {
    background: #333;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

nav a {
    color: white;
    margin: 0 10px;
    text-decoration: none;
}

nav a:hover {
    color: yellow;
}

section {
    padding: 40px;
    text-align: center;
}

.card {
    background: white;
    padding: 20px;
    margin: 20px auto;
    width: 200px;
    box-shadow: 0 0 10px gray;
}

button {
    padding: 10px 20px;
    background: blue;
    color: white;
    border: none;
}

button:hover {
    background: darkblue;
}

footer {
    background: #333;
    color: white;
    text-align: center;
    padding: 10px;
}
</style>
</head>
<body>

<header>
    <h1>Siva Portfolio</h1>
    <nav>
        <a href="#about">About</a>
        <a href="#skills">Skills</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section id="about">
    <h2>About Me</h2>
    <p>I am learning web development and building projects.</p>
</section>

<section id="skills">
    <h2>Skills</h2>
    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript (Learning)</li>
    </ul>
</section>

<section id="projects">
    <h2>Projects</h2>
    <div class="card">
        <h3>Project 1</h3>
        <p>Simple website using HTML & CSS</p>
    </div>
</section>

<section id="contact">
    <h2>Contact</h2>
    <button>Contact Me</button>
</section>

<footer>
    <p>© 2026 My Portfolio</p>
</footer>

</body>
</html>
